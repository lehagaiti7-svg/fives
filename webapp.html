<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Star Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="purple"] {
    --purple: #a855f7;
    --purple-bright: #c084fc;
    --purple-deep: #6d28d9;
    --purple-glow: rgba(168, 85, 247, 0.4);
    --purple-soft: rgba(168, 85, 247, 0.15);
    --bg: #050208;
    --bg-deep: #000000;
    --text: #f5f3ff;
    --text-dim: #a78bfa;
    --text-mute: #6b5b8e;
    --glass: rgba(168, 85, 247, 0.06);
    --glass-border: rgba(168, 85, 247, 0.18);
    --danger: #f43f5e;
    --bg-gradient:
      radial-gradient(ellipse at 20% 0%, rgba(109, 40, 217, 0.25), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(168, 85, 247, 0.2), transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(91, 33, 182, 0.1), transparent 70%),
      var(--bg);
    --panel-bg: rgba(15, 5, 25, 0.6);
    --star-display: block;
  }

  /* Светлая тема как в MAX */
  [data-theme="light"] {
    --purple: #2b7fff;
    --purple-bright: #4f9bff;
    --purple-deep: #1a5fd0;
    --purple-glow: rgba(43, 127, 255, 0.3);
    --purple-soft: rgba(43, 127, 255, 0.12);
    --bg: #ffffff;
    --bg-deep: #f0f2f5;
    --text: #0f1419;
    --text-dim: #3a6ea5;
    --text-mute: #8a9099;
    --glass: rgba(43, 127, 255, 0.05);
    --glass-border: rgba(0, 0, 0, 0.08);
    --danger: #e0245e;
    --bg-gradient: var(--bg);
    --panel-bg: rgba(255, 255, 255, 0.85);
    --star-display: none;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    padding-bottom: 90px;
    position: relative;
    background: var(--bg-gradient);
    transition: background 0.4s ease, color 0.4s ease;
  }

  /* ============ STAR FIELD ============ */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
    display: var(--star-display);
  }
  .star {
    position: absolute;
    color: var(--purple-bright);
    text-shadow: 0 0 8px var(--purple-glow), 0 0 16px var(--purple-glow);
    user-select: none;
    will-change: transform;
    transition: opacity 1s ease;
  }

  /* ============ APP ============ */
  #app { position: relative; z-index: 2; }

  .header {
    padding: 28px 20px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
  }
  .header-logo {
    width: 56px; height: 56px;
    position: relative;
    flex-shrink: 0;
    filter: drop-shadow(0 0 16px var(--purple-glow)) drop-shadow(0 0 32px rgba(168, 85, 247, 0.3));
    animation: logoFloat 4s ease-in-out infinite;
  }
  .header-logo img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-4px) rotate(2deg); }
  }
  .header-title {
    flex: 1;
    min-width: 0;
  }
  .header-title h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 30%, var(--purple-bright) 90%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
  }
  .header-title p {
    font-size: 11px;
    color: var(--text-mute);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ============ TAB BAR ============ */
  .tab-bar {
    position: fixed;
    bottom: 14px; left: 14px; right: 14px;
    background: rgba(15, 5, 25, 0.7);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 22px;
    display: flex;
    z-index: 100;
    box-shadow:
      0 10px 40px rgba(0,0,0,0.5),
      0 0 30px rgba(168, 85, 247, 0.1),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .tab {
    flex: 1;
    padding: 14px 8px 12px;
    text-align: center;
    cursor: pointer;
    color: var(--text-mute);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.3s, transform 0.2s;
    position: relative;
  }
  .tab .icon {
    width: 30px; height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 4px;
    transition: transform 0.3s, filter 0.3s;
    opacity: 0.55;
  }
  .tab .icon svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .tab.active {
    color: var(--purple-bright);
  }
  .tab.active .icon {
    opacity: 1;
    transform: translateY(-2px);
    filter: drop-shadow(0 0 10px var(--purple-glow)) drop-shadow(0 0 4px rgba(192, 132, 252, 0.6));
  }
  /* активный таб без точки — только подсветка иконки */

  /* ============ SECTIONS ============ */
  .section { display: none; padding: 0 14px; animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
  .section.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin: 20px 6px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--glass-border), transparent);
  }

  /* ============ CARD / LIST ITEM ============ */
  .card {
    background: transparent;
    border-radius: 0;
    overflow: hidden;
    margin-bottom: 0;
    position: relative;
    transition: background 0.15s;
  }
  /* Карточки в разделе Аккаунты — со стеклом */
  #section-accounts .card,
  #section-dialogs .card {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    margin-bottom: 10px;
  }
  #section-accounts .card::before,
  #section-dialogs .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(168, 85, 247, 0.08), transparent 50%);
    pointer-events: none;
  }
  /* В разделе чатов — плоский список */
  #section-chats .card {
    background: transparent;
    border: none;
    border-radius: 0;
  }
  #section-chats .card:active {
    background: rgba(168, 85, 247, 0.08);
  }
  .card:active { transform: scale(0.99); }

  .list-item {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    position: relative;
    z-index: 1;
  }

  .avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-deep), var(--purple-bright));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px var(--purple-glow);
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .item-content { flex: 1; min-width: 0; }
  .item-title-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 3px;
  }
  .item-title {
    font-weight: 600;
    font-size: 15px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item-time {
    font-size: 11px;
    color: var(--text-mute);
    flex-shrink: 0;
  }
  .item-subtitle-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .item-subtitle {
    color: var(--text-mute);
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.02em;
    flex: 1;
  }
  .badge-count {
    background: var(--purple);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 6px var(--purple-glow);
  }
  .item-action {
    color: var(--purple-bright);
    font-size: 20px;
    padding: 8px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .list-item:active .item-action { opacity: 1; }

  /* ============ BADGES ============ */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .badge.ok { background: rgba(168, 85, 247, 0.18); color: var(--purple-bright); border: 1px solid var(--purple-soft); }
  .badge.warn { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
  .badge.live { background: rgba(168, 85, 247, 0.2); color: var(--purple-bright); }
  .badge.live::before {
    content: '';
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--purple-bright);
    border-radius: 50%;
    margin-right: 5px;
    box-shadow: 0 0 6px var(--purple-bright);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ============ BUTTONS ============ */
  .btn {
    background: linear-gradient(135deg, var(--purple), var(--purple-deep));
    color: #fff;
    border: none;
    padding: 14px 22px;
    border-radius: 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3), inset 0 1px 0 rgba(255,255,255,0.15);
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.6s;
  }
  .btn:hover::before { left: 100%; }
  .btn:active { transform: scale(0.97); }

  .btn-ghost {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    box-shadow: none;
    color: var(--text);
  }
  .btn-icon {
    width: 16px;
    height: 16px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
    margin-top: -2px;
  }
  .btn-block { display: block; margin: 18px 6px; width: calc(100% - 12px); }

  .btn-add {
    background: linear-gradient(135deg, var(--purple), var(--purple-deep));
    border: 1px solid var(--purple-bright);
    box-shadow: 0 10px 32px var(--purple-glow), inset 0 1px 0 rgba(255,255,255,0.2);
    position: relative;
  }
  .btn-add .star-mini {
    position: absolute;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    animation: twinkle 2s ease-in-out infinite;
  }
  .btn-add .star-mini:nth-child(1) { top: 8px; left: 16px; animation-delay: 0s; }
  .btn-add .star-mini:nth-child(2) { bottom: 10px; right: 22px; animation-delay: 0.7s; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ============ EMPTY STATE ============ */
  .empty-state {
    text-align: center;
    padding: 60px 24px 40px;
    color: var(--text-mute);
  }
  .empty-state .empty-icon {
    width: 80px; height: 80px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--purple-soft), transparent 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: var(--purple-bright);
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .empty-state h3 {
    font-family: 'Syne', sans-serif;
    color: var(--text);
    font-size: 18px;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .empty-state p { font-size: 13px; color: var(--text-mute); }

  /* ============ MODAL ============ */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(5, 2, 8, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    animation: fadeIn 0.3s;
  }
  .modal.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-content {
    background: linear-gradient(180deg, rgba(30, 10, 50, 0.95), rgba(15, 5, 25, 0.98));
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
    border-top: 1px solid var(--purple);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 -10px 40px rgba(168, 85, 247, 0.2);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle {
    width: 44px; height: 4px;
    background: var(--purple-soft);
    border-radius: 4px;
    margin: -6px auto 18px;
  }

  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .modal .modal-sub {
    color: var(--text-mute);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .modal img {
    width: 100%;
    border-radius: 14px;
    margin: 12px 0;
    border: 1px solid var(--glass-border);
  }

  .input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    color: var(--text);
    border: 1px solid var(--glass-border);
    padding: 14px 16px;
    border-radius: 12px;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    margin: 6px 0 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input::placeholder { color: var(--text-mute); }
  .input:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px var(--purple-soft);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .btn-row .btn { flex: 1; }

  /* ============ SPINNER ============ */
  .spinner {
    width: 36px; height: 36px;
    margin: 24px auto;
    border-radius: 50%;
    border: 2px solid var(--purple-soft);
    border-top-color: var(--purple-bright);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============ TOAST ============ */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30, 10, 50, 0.95);
    backdrop-filter: blur(16px);
    border: 1px solid var(--purple);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 14px;
    z-index: 300;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    box-shadow: 0 8px 32px var(--purple-glow);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============ BACK BUTTON ============ */
  .back-btn {
    padding: 14px 20px;
    color: var(--purple-bright);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.2s;
  }
  .back-btn:active { opacity: 0.6; }

  /* ============ SUCCESS CHECK ============ */
  .success-circle {
    width: 80px; height: 80px;
    margin: 16px auto 12px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--purple), var(--purple-deep));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    box-shadow: 0 0 40px var(--purple-glow);
    animation: successPop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes successPop {
    0% { transform: scale(0); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* ============ SEARCH BAR ============ */
  .search-bar {
    position: relative;
    margin: 6px 6px 12px;
  }
  .search-bar input {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text);
    padding: 10px 14px 10px 38px;
    border-radius: 12px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar input::placeholder { color: var(--text-mute); }
  .search-bar input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px var(--purple-soft);
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--text-mute);
    pointer-events: none;
  }

  /* ============ PROFILE ============ */
  .profile-avatar {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-deep), var(--purple-bright));
    margin: 16px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 44px;
    color: #fff;
    overflow: hidden;
    box-shadow: 0 8px 32px var(--purple-glow);
  }
  .profile-avatar img { width:100%; height:100%; object-fit: cover; display: block; }
  .profile-name {
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 22px;
    margin-bottom: 8px;
  }
  .profile-info-block {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 8px 12px;
    margin: 6px 0;
    font-size: 14px;
    color: var(--text);
  }

  /* ============ MESSAGES ============ */
  .messages-container {
    padding: 12px 10px 100px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* строка с аватаркой + сообщением */
  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    margin-top: 8px;
    animation: fadeUp 0.3s ease;
  }
  .msg-row.incoming { justify-content: flex-start; }
  .msg-row.outgoing { justify-content: flex-end; }

  /* сгруппированные подряд сообщения - меньше промежуток */
  .msg-row.grouped { margin-top: 1px; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-deep), var(--purple-bright));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
    flex-shrink: 0;
    color: #fff;
    box-shadow: 0 2px 8px var(--purple-glow);
  }
  .msg-avatar.hidden { visibility: hidden; }

  /* пузырь сообщения */
  .msg-bubble {
    max-width: 75%;
    padding: 8px 12px 6px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.35;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    position: relative;
  }
  .msg-row.incoming .msg-bubble {
    background: rgba(168, 85, 247, 0.12);
    border: 1px solid rgba(168, 85, 247, 0.18);
    color: var(--text);
    border-bottom-left-radius: 6px;
  }
  .msg-row.outgoing .msg-bubble {
    background: linear-gradient(135deg, var(--purple), var(--purple-deep));
    color: #fff;
    border-bottom-right-radius: 6px;
    box-shadow: 0 2px 10px rgba(168, 85, 247, 0.3);
  }

  .msg-text {
    white-space: pre-wrap;
  }
  .msg-forward {
    border-left: 2px solid var(--purple-bright);
    padding: 2px 0 2px 8px;
    margin-bottom: 4px;
    font-size: 12px;
    opacity: 0.85;
  }
  .msg-forward-name {
    color: var(--purple-bright);
    font-weight: 600;
    font-size: 11px;
  }
  .msg-time {
    font-size: 10px;
    opacity: 0.65;
    margin-top: 3px;
    text-align: right;
    letter-spacing: 0.02em;
  }
  .msg-row.incoming .msg-time { color: var(--text-mute); }

  /* Имя автора над сообщением */
  .msg-author {
    font-size: 12px;
    font-weight: 700;
    color: var(--purple-bright);
    margin-bottom: 2px;
  }

  /* Дата-разделитель */
  .date-divider {
    text-align: center;
    margin: 16px 0 12px;
    position: relative;
  }
  .date-divider span {
    display: inline-block;
    padding: 4px 14px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    font-size: 12px;
    color: var(--text-mute);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    text-transform: capitalize;
    font-weight: 500;
  }

  /* Медиа в сообщениях */
  .msg-media {
    display: grid;
    grid-template-columns: 1fr;
    gap: 4px;
    margin-bottom: 6px;
    border-radius: 12px;
    overflow: hidden;
    max-width: 280px;
  }
  .msg-media.multi { grid-template-columns: 1fr 1fr; }
  .msg-media img, .msg-media video {
    width: 100%;
    max-height: 280px;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }

  /* Реакции */
  .msg-reactions {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 5px;
  }
  .reaction-chip {
    background: rgba(168, 85, 247, 0.15);
    border: 1px solid rgba(168, 85, 247, 0.25);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    line-height: 1.3;
  }
  .reaction-chip.active {
    background: var(--purple);
    color: #fff;
    border-color: var(--purple-bright);
  }

  /* Голосовое сообщение */
  .voice-msg {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 4px;
    min-width: 180px;
  }
  .voice-play {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--purple-bright);
    border: none;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .voice-play:active { transform: scale(0.92); }
  .voice-info {
    flex: 1;
    min-width: 0;
  }
  .voice-wave {
    height: 24px;
    background: linear-gradient(90deg, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.15) 50%);
    background-size: 200% 100%;
    background-position: 100% 0;
    border-radius: 4px;
    margin-bottom: 2px;
  }
  .msg-row.incoming .voice-wave {
    background: linear-gradient(90deg, var(--purple-bright) 50%, rgba(168, 85, 247, 0.2) 50%);
    background-size: 200% 100%;
    background-position: 100% 0;
  }
  .voice-duration {
    font-size: 11px;
    opacity: 0.7;
  }

  .chat-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(15, 5, 25, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .chat-header .avatar { width: 38px; height: 38px; font-size: 15px; border-radius: 50%; }
  .chat-header-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ============ ITEM STAGGER ANIMATION ============ */
  .list-item-wrap { opacity: 0; animation: itemEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes itemEnter {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* ============ MESSAGE INPUT BAR ============ */
  .message-input-bar {
    position: fixed;
    bottom: 78px;
    left: 0; right: 0;
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    background: var(--panel-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--glass-border);
    z-index: 50;
  }
  .message-input-bar input {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text);
    padding: 11px 16px;
    border-radius: 22px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .message-input-bar input::placeholder { color: var(--text-mute); }
  .message-input-bar input:focus { border-color: var(--purple); }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--purple-deep));
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 14px var(--purple-glow);
    transition: transform 0.15s;
  }
  .send-btn:active { transform: scale(0.9); }
  .send-btn svg { width: 20px; height: 20px; }

  /* поле ввода видно только когда чат открыт */
  #section-chat-view:not(.active) .message-input-bar { display: none; }

  /* ============ THEME TOGGLE ============ */
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s, background 0.2s;
  }
  .theme-toggle:active { transform: scale(0.9); }
  .theme-toggle svg { width: 20px; height: 20px; }

  /* ============ DESKTOP TWO-PANEL LAYOUT ============ */
  @media (min-width: 1100px) {
    body { padding-bottom: 0; }

    #app {
      display: grid;
      grid-template-columns: 380px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "header header"
        "sidebar main";
      height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
      gap: 0;
    }

    .header {
      grid-area: header;
      border-bottom: 1px solid var(--glass-border);
    }

    /* Левая колонка: аккаунты + список чатов */
    #section-accounts,
    #section-dialogs,
    #section-chats {
      grid-area: sidebar;
      display: none;
      overflow-y: auto;
      border-right: 1px solid var(--glass-border);
      padding-bottom: 20px;
      height: 100%;
    }
    #section-accounts.active,
    #section-dialogs.active,
    #section-chats.active { display: block; }

    /* Правая колонка: переписка */
    #section-chat-view {
      grid-area: main;
      display: flex !important;
      flex-direction: column;
      height: calc(100vh - 90px);
      overflow: hidden;
    }
    #section-chat-view:not(.has-chat) .chat-header,
    #section-chat-view:not(.has-chat) #load-older-btn,
    #section-chat-view:not(.has-chat) #messages-list {
      display: none;
    }
    #section-chat-view:not(.has-chat)::before {
      content: '✦ Выбери чат слева';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-mute);
      font-family: 'Syne', sans-serif;
      font-size: 18px;
    }
    #section-chat-view .messages-container {
      flex: 1;
      overflow-y: auto;
    }
    /* На десктопе поле ввода внутри правой панели, не fixed */
    #section-chat-view .message-input-bar {
      position: static;
      bottom: auto;
    }
    #section-chat-view:not(.has-chat) .message-input-bar { display: none; }
    .chat-header .back-btn:first-child { display: none; } /* на десктопе кнопка "назад" не нужна */

    /* Таб-бар сбоку вертикально на десктопе */
    .tab-bar {
      position: static;
      flex-direction: row;
      width: auto;
      margin: 12px 16px;
      grid-area: header;
      justify-self: end;
      align-self: center;
      max-width: 280px;
    }

    /* Скрываем мобильный back в разделах */
    #section-chats > .back-btn { display: none; }
  }

</style>
</head>
<body>

<!-- ============ STAR FIELD ============ -->
<div class="stars" id="stars"></div>

<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">
      <img src="/static/logo.png" alt="">
    </div>
    <div class="header-title">
      <h1>Star Panel</h1>
      <p>MAX Control Center</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему">
      <svg class="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>

  <!-- АККАУНТЫ -->
  <div class="section active" id="section-accounts">
    <div class="section-title">Аккаунты</div>
    <div id="accounts-list"></div>
    <button class="btn btn-add btn-block" onclick="startAddAccount()">
      <span class="star-mini">✦</span>
      <span class="star-mini">✦</span>
      ✦ Добавить аккаунт
    </button>
  </div>

  <!-- ДИАЛОГИ — выбор аккаунта -->
  <div class="section" id="section-dialogs">
    <div class="section-title">Выбери аккаунт</div>
    <div id="dialogs-accounts"></div>
  </div>

  <!-- ДИАЛОГИ — список чатов -->
  <div class="section" id="section-chats">
    <div class="back-btn" onclick="showDialogs()">← Назад</div>
    <div class="section-title" id="chats-header">Чаты</div>
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="chat-search" placeholder="Поиск" oninput="filterChats(this.value)">
    </div>
    <div id="chats-list"></div>
  </div>

  <!-- ПЕРЕПИСКА -->
  <div class="section" id="section-chat-view">
    <div class="chat-header">
      <div class="back-btn" style="padding: 0; color: var(--purple-bright);" onclick="backToChatList()">←</div>
      <div class="avatar" id="chat-view-avatar" onclick="openProfile()" style="cursor:pointer;">?</div>
      <div class="chat-header-name" id="chat-view-name" onclick="openProfile()" style="cursor:pointer;">Чат</div>
      <div class="back-btn" style="padding: 0; color: var(--purple-bright);" onclick="refreshChatMessages()">
        <svg style="width:18px;height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 0 1-15.5 6.5L3 16"/>
          <path d="M3 12a9 9 0 0 1 15.5-6.5L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M3 21v-5h5"/>
        </svg>
      </div>
    </div>
    <button class="btn btn-ghost" id="load-older-btn" style="margin: 12px 16px 0;" onclick="loadOlder()">
      ↑ Загрузить старее
    </button>
    <div class="messages-container" id="messages-list"></div>
    <div class="message-input-bar">
      <input type="text" id="message-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <!-- общие фильтры/градиенты для иконок -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- основной градиент стекла: фиолетовый→синий -->
      <linearGradient id="glass-body" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%" stop-color="#e9d5ff"/>
        <stop offset="20%" stop-color="#c084fc"/>
        <stop offset="55%" stop-color="#7c3aed"/>
        <stop offset="85%" stop-color="#3b1d8a"/>
        <stop offset="100%" stop-color="#1e0a4a"/>
      </linearGradient>
      <!-- неоновая обводка по краю -->
      <linearGradient id="glass-edge" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f0abfc"/>
        <stop offset="35%" stop-color="#c084fc"/>
        <stop offset="65%" stop-color="#60a5fa"/>
        <stop offset="100%" stop-color="#f0abfc"/>
      </linearGradient>
      <!-- ЯРКОЕ фиолетово-синее тело с переходами (как на эталоне-человечке) -->
      <linearGradient id="chrome-inner" x1="20%" y1="0%" x2="80%" y2="100%">
        <stop offset="0%" stop-color="#a855f7"/>
        <stop offset="35%" stop-color="#7c3aed"/>
        <stop offset="65%" stop-color="#6366f1"/>
        <stop offset="100%" stop-color="#a855f7"/>
      </linearGradient>
      <!-- ХРОМ-ОБВОДКА (металлический рант) — фиолетово-синяя -->
      <linearGradient id="chrome-rim" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#f5d0fe"/>
        <stop offset="15%" stop-color="#e9d5ff"/>
        <stop offset="35%" stop-color="#c084fc"/>
        <stop offset="55%" stop-color="#7c3aed"/>
        <stop offset="75%" stop-color="#a855f7"/>
        <stop offset="90%" stop-color="#e9d5ff"/>
        <stop offset="100%" stop-color="#f5d0fe"/>
      </linearGradient>
      <!-- Розовый акцент-блик (как на эталоне внизу шара) -->
      <linearGradient id="chrome-pink" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#f0abfc"/>
        <stop offset="50%" stop-color="#e879f9"/>
        <stop offset="100%" stop-color="#f0abfc"/>
      </linearGradient>
      <!-- блик-звёздочка -->
      <radialGradient id="chrome-sparkle" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
        <stop offset="30%" stop-color="#ffffff" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <!-- верхний глянцевый блик -->
      <linearGradient id="glass-shine" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
        <stop offset="40%" stop-color="#ffffff" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <!-- радиальный блик-точка -->
      <radialGradient id="glass-spot" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
        <stop offset="60%" stop-color="#ffffff" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <!-- свечение под объектом -->
      <filter id="glass-glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  </svg>

  <div class="tab active" data-section="accounts" onclick="switchTab('accounts')">
    <div class="icon">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="flat-purple" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
          <linearGradient id="glass-hl" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <!-- ТЕЛО (плечи) -->
        <path d="M 10 58 Q 10 38 32 38 Q 54 38 54 58 Z" fill="url(#flat-purple)"/>
        <!-- блик на плечах -->
        <path d="M 14 50 Q 16 43 32 43 Q 48 43 50 50 Q 46 46 32 46 Q 18 46 14 50 Z" fill="url(#glass-hl)"/>
        <!-- ГОЛОВА -->
        <circle cx="32" cy="20" r="11" fill="url(#flat-purple)"/>
        <!-- глянцевый блик на голове -->
        <ellipse cx="28" cy="14.5" rx="6" ry="3.5" fill="url(#glass-hl)"/>
        <!-- маленькая яркая точка-блик -->
        <circle cx="27" cy="13" r="1.4" fill="#ffffff" opacity="0.85"/>
      </svg>
    </div>
    <div>Аккаунты</div>
  </div>

  <div class="tab" data-section="dialogs" onclick="switchTab('dialogs')">
    <div class="icon">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <!-- ОВАЛЬНОЕ ОБЛАКО с маленьким "хвостиком-каплей" слева внизу (как на образце) -->
        <path d="M 32 10
                 C 47 10, 56 18, 56 28
                 C 56 38, 47 46, 32 46
                 C 27 46, 22.5 45.3, 19 44
                 C 18.5 47, 17 50, 14 51.5
                 C 13.5 51.8, 13 51.4, 13.2 50.8
                 C 14.5 48, 15 45, 15.5 42
                 C 11 38, 8 33, 8 28
                 C 8 18, 17 10, 32 10 Z"
              fill="url(#flat-purple)"/>
        <!-- верхний glass-блик -->
        <path d="M 18 16
                 C 23 13, 29 12, 32 12
                 C 41 12, 49 14.5, 53 18
                 C 50 16.5, 43 16, 32 16
                 C 23 16, 18 17, 16.5 18 Z"
              fill="url(#glass-hl)"/>
        <!-- блик-точка слева сверху -->
        <circle cx="20" cy="16" r="1.8" fill="#ffffff" opacity="0.9"/>
      </svg>
    </div>
    <div>Диалоги</div>
  </div>
</div>

<!-- MODAL: добавление аккаунта -->
<div class="modal" id="modal-add">
  <div class="modal-content">
    <div class="modal-handle"></div>
    <h3 id="add-step-title">Новый аккаунт</h3>
    <p class="modal-sub" id="add-step-sub">Подключи MAX к Star Panel</p>

    <div id="add-step-1">
      <input type="text" class="input" id="account-name" placeholder="Имя аккаунта (например: work)" autocomplete="off">
      <button class="btn" onclick="requestQR()">Получить QR-код</button>
    </div>

    <div id="add-step-2" style="display:none;">
      <div id="qr-container"><div class="spinner"></div></div>
      <p class="modal-sub" style="text-align:center; margin: 8px 0;">Отсканируй QR в приложении MAX</p>
      <input type="password" class="input" id="account-password" placeholder="Пароль (если запросит MAX)">
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="refreshScreen()">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 1-15.5 6.5L3 16"/>
            <path d="M3 12a9 9 0 0 1 15.5-6.5L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M3 21v-5h5"/>
          </svg>
          Обновить
        </button>
        <button class="btn" onclick="submitPassword()">✦ Продолжить</button>
      </div>
      <button class="btn btn-ghost" style="margin-top: 8px;" onclick="saveWithoutPassword()">
        💾 Сохранить без пароля
      </button>
    </div>

    <div id="add-step-done" style="display:none; text-align:center; padding: 12px 0;">
      <div class="success-circle">✦</div>
      <h3 style="font-size: 18px; margin-top: 8px;">Готово!</h3>
      <p class="modal-sub">Аккаунт добавлен в Star Panel</p>
    </div>

    <button class="btn btn-ghost" style="margin-top: 12px;" onclick="closeModal()">Закрыть</button>
  </div>
</div>

<!-- Модалка профиля -->
<div class="modal" id="modal-profile">
  <div class="modal-content">
    <div class="modal-handle"></div>
    <div id="profile-content">
      <div class="spinner"></div>
    </div>
    <button class="btn btn-ghost" style="margin-top: 12px;" onclick="closeProfile()">Закрыть</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let initData = tg.initData;
let currentAccount = null;

// ============ THEME ============
let currentTheme = 'purple';

function applyTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  const darkIcon = document.querySelector('.theme-icon-dark');
  const lightIcon = document.querySelector('.theme-icon-light');
  if (theme === 'light') {
    if (darkIcon) darkIcon.style.display = 'none';
    if (lightIcon) lightIcon.style.display = 'block';
    tg.setHeaderColor && tg.setHeaderColor('#ffffff');
    tg.setBackgroundColor && tg.setBackgroundColor('#ffffff');
  } else {
    if (darkIcon) darkIcon.style.display = 'block';
    if (lightIcon) lightIcon.style.display = 'none';
    tg.setHeaderColor && tg.setHeaderColor('#050208');
    tg.setBackgroundColor && tg.setBackgroundColor('#050208');
  }
}

function toggleTheme() {
  hapticLight();
  applyTheme(currentTheme === 'purple' ? 'light' : 'purple');
}

applyTheme('purple');

// ============ Star field: vertical drift + cursor avoidance ============
const stars = [];
const symbols = ['✦', '✧', '⋆', '✦'];
const STAR_COUNT = 55;
const AWARENESS_RADIUS = 130;   // дистанция "видения" пальца
const TARGET_SPEED = 2.2;       // целевая скорость убегания
const ACCEL = 0.14;             // ускорение к цели
const FRICTION = 0.90;          // затухание после ухода пальца

let pointer = { x: -1000, y: -1000, active: false };

function spawnStar(s, fromBottom = false) {
  const W = window.innerWidth;
  const H = window.innerHeight;
  s.x = Math.random() * W;
  s.y = fromBottom ? H + 20 : Math.random() * H;
  s.baseVx = (Math.random() - 0.5) * 0.15;
  s.baseVy = -(0.15 + Math.random() * 0.2);
  s.vx = 0;
  s.vy = 0;
  s.rotSpeed = (Math.random() - 0.5) * 0.3;
}

function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < STAR_COUNT; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    const size = 8 + Math.random() * 18;
    el.style.fontSize = size + 'px';
    el.style.opacity = 0.35 + Math.random() * 0.55;
    container.appendChild(el);
    const s = { el, rotation: Math.random() * 360 };
    spawnStar(s, false);
    stars.push(s);
  }
}

function animate() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  for (const s of stars) {
    // ИЗБЕГАНИЕ — звезда стремится к ЦЕЛЕВОЙ скорости убегания, а не разгоняется бесконтрольно
    if (pointer.active) {
      const dx = s.x - pointer.x;
      const dy = s.y - pointer.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < AWARENESS_RADIUS && dist > 0.1) {
        // целевая скорость — пропорциональна близости к пальцу
        const t = 1 - dist / AWARENESS_RADIUS;
        const desiredSpeed = TARGET_SPEED * t;  // даже у самого пальца — невысокая
        const desiredVx = (dx / dist) * desiredSpeed;
        const desiredVy = (dy / dist) * desiredSpeed;
        // плавно стремимся к этой скорости (а не накапливаем импульс)
        s.vx += (desiredVx - s.vx) * ACCEL;
        s.vy += (desiredVy - s.vy) * ACCEL;
      } else {
        s.vx *= FRICTION;
        s.vy *= FRICTION;
      }
    } else {
      // палец убран — импульс плавно гасится
      s.vx *= FRICTION;
      s.vy *= FRICTION;
    }

    // Применяем базовое движение + импульс
    s.x += s.baseVx + s.vx;
    s.y += s.baseVy + s.vy;
    s.rotation += s.rotSpeed;

    // Респавн при выходе за пределы (сверху — респавн снизу = "продолжает лететь")
    if (s.y < -40 || s.x < -60 || s.x > W + 60) {
      spawnStar(s, true);
    }

    s.el.style.transform = `translate(${s.x}px, ${s.y}px) rotate(${s.rotation}deg)`;
  }

  requestAnimationFrame(animate);
}

function setPointer(x, y) {
  pointer.x = x;
  pointer.y = y;
  pointer.active = true;
  clearTimeout(pointer.timeout);
  pointer.timeout = setTimeout(() => { pointer.active = false; }, 250);
}

window.addEventListener('mousemove', (e) => setPointer(e.clientX, e.clientY), { passive: true });
window.addEventListener('touchmove', (e) => {
  if (e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });
window.addEventListener('touchstart', (e) => {
  if (e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

createStars();
animate();

// ============ API ============
async function api(path, opts = {}) {
  const headers = { 'X-Telegram-Init-Data': initData, ...(opts.headers || {}) };
  if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch('/api' + path, { ...opts, headers });
  if (!res.ok) {
    let errMsg = `HTTP ${res.status}`;
    try {
      const data = await res.json();
      // detail может быть строкой, объектом или массивом (FastAPI validation)
      if (typeof data.detail === 'string') {
        errMsg = data.detail;
      } else if (Array.isArray(data.detail)) {
        errMsg = data.detail.map(d => d.msg || JSON.stringify(d)).join('; ');
      } else if (data.detail) {
        errMsg = JSON.stringify(data.detail);
      } else if (data.message) {
        errMsg = data.message;
      }
    } catch {
      try { errMsg = await res.text(); } catch {}
    }
    throw new Error(errMsg);
  }
  return res.json();
}

function escapeHtmlInline(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function hapticLight() {
  try { tg.HapticFeedback.impactOccurred('light'); } catch {}
}

// ============ Навигация ============
function switchTab(name) {
  hapticLight();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.section === name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  if (name === 'accounts') {
    document.getElementById('section-accounts').classList.add('active');
    loadAccounts();
  } else if (name === 'dialogs') {
    document.getElementById('section-dialogs').classList.add('active');
    loadDialogsAccounts();
  }
}

function showDialogs() {
  hapticLight();
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-dialogs').classList.add('active');
}

// ============ АККАУНТЫ ============
function renderAccount(a, i, onClick) {
  const passwordBtn = (!onClick && a.active && !a.saved)
    ? `<div class="item-action" style="color: var(--purple-bright);" onclick="event.stopPropagation(); retryPassword('${a.name}')" title="Ввести пароль">🔑</div>`
    : '';
  return `
    <div class="card list-item-wrap" style="animation-delay:${i * 60}ms;">
      <div class="list-item" ${onClick ? `onclick="${onClick}"` : ''}>
        <div class="avatar">${a.name[0].toUpperCase()}</div>
        <div class="item-content">
          <div class="item-title">${a.name}
            ${a.saved ? '<span class="badge ok">SAVED</span>' : '<span class="badge warn">NEW</span>'}
          </div>
          <div class="item-subtitle">${a.active ? '<span class="badge live">ONLINE</span>' : 'не активен'}</div>
        </div>
        ${onClick
          ? '<div class="item-action">→</div>'
          : `${passwordBtn}<div class="item-action" onclick="event.stopPropagation(); confirmDelete('${a.name}')">✕</div>`}
      </div>
    </div>
  `;
}

async function retryPassword(name) {
  currentAccount = name;
  document.getElementById('modal-add').classList.add('active');
  document.getElementById('add-step-1').style.display = 'none';
  document.getElementById('add-step-2').style.display = 'block';
  document.getElementById('add-step-done').style.display = 'none';
  document.getElementById('account-password').value = '';
  // показываем текущий экран сразу
  await refreshScreen();
}

async function loadAccounts() {
  const list = document.getElementById('accounts-list');
  list.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api('/accounts');
    if (!data.accounts.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✦</div>
          <h3>Пока никого</h3>
          <p>Добавь первый аккаунт ↓</p>
        </div>`;
      return;
    }
    list.innerHTML = data.accounts.map((a, i) => renderAccount(a, i, null)).join('');
  } catch (e) {
    list.innerHTML = `<div class="empty-state"><p>Ошибка: ${e.message}</p></div>`;
  }
}

function confirmDelete(name) {
  hapticLight();
  tg.showConfirm(`Удалить аккаунт "${name}"?`, async (ok) => {
    if (!ok) return;
    try {
      await api('/accounts/' + encodeURIComponent(name), { method: 'DELETE' });
      toast('Удалён');
      loadAccounts();
    } catch (e) { toast('Ошибка: ' + e.message); }
  });
}

// ============ ДОБАВЛЕНИЕ ============
function startAddAccount() {
  hapticLight();
  document.getElementById('modal-add').classList.add('active');
  document.getElementById('add-step-1').style.display = 'block';
  document.getElementById('add-step-2').style.display = 'none';
  document.getElementById('add-step-done').style.display = 'none';
  document.getElementById('account-name').value = '';
  document.getElementById('account-password').value = '';
}

function closeModal() {
  document.getElementById('modal-add').classList.remove('active');
}

async function requestQR() {
  const name = document.getElementById('account-name').value.trim();
  if (!name) { toast('Укажи имя'); return; }
  currentAccount = name;
  document.getElementById('add-step-1').style.display = 'none';
  document.getElementById('add-step-2').style.display = 'block';
  document.getElementById('qr-container').innerHTML = '<div class="spinner"></div><p class="modal-sub" style="text-align:center;">Открываю MAX...</p>';
  try {
    const data = await api('/accounts/' + encodeURIComponent(name) + '/qr', { method: 'POST' });
    document.getElementById('qr-container').innerHTML = `<img src="${data.qr_url}?t=${Date.now()}" alt="QR">`;
  } catch (e) {
    document.getElementById('qr-container').innerHTML = `<p style="color:var(--danger); text-align:center; padding: 20px;">${e.message}</p>`;
  }
}

async function refreshScreen() {
  hapticLight();
  const container = document.getElementById('qr-container');
  const oldHTML = container.innerHTML;
  container.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api('/accounts/' + encodeURIComponent(currentAccount) + '/screen', { method: 'POST' });
    container.innerHTML = `<img src="${data.screen_url}?t=${Date.now()}" alt="screen">`;
  } catch (e) {
    container.innerHTML = oldHTML;
    toast('Ошибка: ' + e.message);
  }
}

function goToPassword() {
  // больше не используется — оставлено для совместимости
  submitPassword();
}

async function submitPassword() {
  const password = document.getElementById('account-password').value;
  if (!password) { toast('Введи пароль или используй "Сохранить без пароля"'); return; }
  try {
    await api('/accounts/' + encodeURIComponent(currentAccount) + '/password', {
      method: 'POST',
      body: { password }
    });
    document.getElementById('add-step-2').style.display = 'none';
    document.getElementById('add-step-done').style.display = 'block';
    setTimeout(() => { closeModal(); loadAccounts(); }, 1800);
  } catch (e) {
    toast('Ошибка: ' + e.message);
  }
}

async function saveWithoutPassword() {
  hapticLight();
  try {
    await api('/accounts/' + encodeURIComponent(currentAccount) + '/password', {
      method: 'POST',
      body: { password: '' }
    });
    document.getElementById('add-step-2').style.display = 'none';
    document.getElementById('add-step-done').style.display = 'block';
    setTimeout(() => { closeModal(); loadAccounts(); }, 1800);
  } catch (e) {
    toast('Ошибка: ' + e.message);
  }
}

// ============ ДИАЛОГИ ============
async function loadDialogsAccounts() {
  const list = document.getElementById('dialogs-accounts');
  list.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api('/accounts');
    if (!data.accounts.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✧</div>
          <h3>Нет аккаунтов</h3>
          <p>Сначала добавь хотя бы один</p>
        </div>`;
      return;
    }
    list.innerHTML = data.accounts.map((a, i) => renderAccount(a, i, `openChats('${a.name}')`)).join('');
  } catch (e) {
    list.innerHTML = `<div class="empty-state"><p>Ошибка: ${e.message}</p></div>`;
  }
}

let currentChatAccount = null;
let currentChatName = null;

async function openChats(account) {
  hapticLight();
  currentChatAccount = account;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-chats').classList.add('active');
  document.getElementById('chats-header').textContent = account;
  const list = document.getElementById('chats-list');
  list.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api('/accounts/' + encodeURIComponent(account) + '/chats');
    if (!data.chats || !data.chats.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✧</div>
          <h3>Чаты не найдены</h3>
        </div>`;
      return;
    }
    allChats = data.chats;
    // очищаем поиск при новой загрузке
    const searchInput = document.getElementById('chat-search');
    if (searchInput) searchInput.value = '';
    list.innerHTML = data.chats.map((c, i) => {
      const safeName = (c.name || '').replace(/'/g, "\\'");
      const initial = (c.name || '?')[0].toUpperCase();
      const avatarHtml = c.avatar
        ? `<div class="avatar"><img src="/api/accounts/${encodeURIComponent(currentChatAccount)}/proxy?url=${encodeURIComponent(c.avatar)}" alt="" onerror="this.parentElement.textContent='${initial}'"></div>`
        : `<div class="avatar">${initial}</div>`;
      return `
      <div class="card list-item-wrap" style="animation-delay:${i * 30}ms;" onclick="openChatView('${safeName}')">
        <div class="list-item">
          ${avatarHtml}
          <div class="item-content">
            <div class="item-title-row">
              <div class="item-title">${escapeHtmlInline(c.name || 'Без имени')}</div>
              ${c.time ? `<div class="item-time">${escapeHtmlInline(c.time)}</div>` : ''}
            </div>
            <div class="item-subtitle-row">
              <div class="item-subtitle">${escapeHtmlInline(c.last_message || '')}</div>
              ${c.unread ? `<div class="badge-count">${c.unread}</div>` : ''}
            </div>
          </div>
        </div>
      </div>
    `;}).join('');
  } catch (e) {
    list.innerHTML = `<div class="empty-state"><p>Ошибка: ${e.message}</p></div>`;
  }
}

let allChats = []; // храним полный список чатов для фильтрации

function filterChats(query) {
  const q = (query || '').toLowerCase().trim();
  document.querySelectorAll('#chats-list .card').forEach(el => {
    const titleEl = el.querySelector('.item-title');
    const name = (titleEl?.innerText || '').toLowerCase();
    el.style.display = (!q || name.includes(q)) ? '' : 'none';
  });
}

async function openProfile() {
  hapticLight();
  document.getElementById('modal-profile').classList.add('active');
  const c = document.getElementById('profile-content');
  c.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api(
      '/accounts/' + encodeURIComponent(currentChatAccount) +
      '/chats/' + encodeURIComponent(currentChatName) + '/profile'
    );
    const name = data.name || currentChatName || '?';
    const initial = name[0].toUpperCase();
    const avatarHtml = data.avatar
      ? `<div class="profile-avatar"><img src="/api/accounts/${encodeURIComponent(currentChatAccount)}/proxy?url=${encodeURIComponent(data.avatar)}" onerror="this.parentElement.textContent='${initial}'"></div>`
      : `<div class="profile-avatar">${initial}</div>`;
    const infoHtml = (data.info || []).map(i =>
      `<div class="profile-info-block">${escapeHtmlInline(i)}</div>`
    ).join('');
    c.innerHTML = `
      ${avatarHtml}
      <div class="profile-name">${escapeHtmlInline(name)}</div>
      ${infoHtml || '<p class="modal-sub" style="text-align:center;">Дополнительной информации нет</p>'}
    `;
  } catch (e) {
    c.innerHTML = `<p style="color:var(--danger); text-align:center; padding:20px;">${e.message}</p>`;
  }
}

function closeProfile() {
  document.getElementById('modal-profile').classList.remove('active');
}

async function openChatView(chatName) {
  hapticLight();
  currentChatName = chatName;

  const isDesktop = window.innerWidth >= 1100;
  const chatView = document.getElementById('section-chat-view');

  if (isDesktop) {
    // На десктопе: список остаётся слева, чат справа
    chatView.classList.add('has-chat');
    // подсветим активный чат в списке
    document.querySelectorAll('#chats-list .card').forEach(c => c.classList.remove('chat-active'));
  } else {
    // Мобильный: переключаем секции
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    chatView.classList.add('active');
  }

  document.getElementById('chat-view-name').textContent = chatName;
  const avatarEl = document.getElementById('chat-view-avatar');
  avatarEl.innerHTML = chatName[0].toUpperCase();

  await refreshChatMessages();
}

function renderMessages(items) {
  const list = document.getElementById('messages-list');
  if (!items || !items.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <h3>Сообщений нет</h3>
      </div>`;
    return;
  }

  const proxyUrl = (url) => '/api/accounts/' + encodeURIComponent(currentChatAccount) + '/proxy?url=' + encodeURIComponent(url);

  let prevOutgoing = null;
  let prevAuthor = null;
  list.innerHTML = items.map((item, i) => {
    // Разделитель даты
    if (item.type === 'date') {
      prevOutgoing = null;
      prevAuthor = null;
      return `<div class="date-divider"><span>${escapeHtmlInline(item.text)}</span></div>`;
    }

    // Сообщение
    const m = item;
    const sameAuthor = prevAuthor === (m.author_name || (m.outgoing ? '__me__' : ''));
    const grouped = prevOutgoing === m.outgoing && sameAuthor;
    prevOutgoing = m.outgoing;
    prevAuthor = m.author_name || (m.outgoing ? '__me__' : '');

    const side = m.outgoing ? 'outgoing' : 'incoming';

    // Показывать ли аватар? Только у последнего сообщения в группе входящих
    const next = items[i + 1];
    const isLastInGroup = !next || next.type === 'date' ||
      next.outgoing !== m.outgoing ||
      (next.author_name || '') !== (m.author_name || '');
    const showAvatar = !m.outgoing && isLastInGroup;

    // Аватарка отправителя
    let avatarHtml = '';
    if (!m.outgoing) {
      if (showAvatar) {
        if (m.author_avatar) {
          avatarHtml = `<div class="msg-avatar"><img src="${proxyUrl(m.author_avatar)}" onerror="this.parentElement.textContent='${escapeHtmlInline((m.author_name || '?')[0].toUpperCase())}'"></div>`;
        } else {
          const initial = (m.author_name || currentChatName || '?')[0].toUpperCase();
          avatarHtml = `<div class="msg-avatar">${initial}</div>`;
        }
      } else {
        avatarHtml = `<div class="msg-avatar hidden"></div>`;
      }
    }

    // Имя автора (показываем только первый раз в группе входящих в групповом чате)
    const showAuthor = !m.outgoing && m.author_name && !grouped;
    const authorBlock = showAuthor
      ? `<div class="msg-author">${escapeHtmlInline(m.author_name)}</div>`
      : '';

    // Пересланное
    const forwardBlock = m.forward_from
      ? `<div class="msg-forward"><div class="msg-forward-name">↪ ${escapeHtmlInline(m.forward_from)}</div></div>`
      : '';

    // Медиа
    let mediaHtml = '';
    if (m.media && m.media.length) {
      const multi = m.media.length > 1 ? 'multi' : '';
      mediaHtml = `<div class="msg-media ${multi}">` + m.media.map(mm => {
        if (mm.type === 'video') {
          return `<video src="${proxyUrl(mm.url)}" controls playsinline></video>`;
        }
        return `<img src="${proxyUrl(mm.url)}" loading="lazy" onclick="openImage('${proxyUrl(mm.url)}')">`;
      }).join('') + `</div>`;
    }

    // Голосовое
    let voiceHtml = '';
    if (m.voice_url) {
      const id = 'voice-' + i;
      voiceHtml = `
        <div class="voice-msg">
          <button class="voice-play" onclick="toggleVoice('${id}', this)">▶</button>
          <div class="voice-info">
            <div class="voice-wave"></div>
            <div class="voice-duration">${escapeHtmlInline(m.voice_duration || 'голосовое')}</div>
          </div>
          <audio id="${id}" src="${proxyUrl(m.voice_url)}" preload="none"></audio>
        </div>`;
    }

    // Текст
    const textBlock = m.text
      ? `<div class="msg-text">${escapeHtmlInline(m.text)}</div>`
      : '';

    // Реакции
    let reactionsHtml = '';
    if (m.reactions && m.reactions.length) {
      reactionsHtml = '<div class="msg-reactions">' + m.reactions.map(r =>
        `<div class="reaction-chip ${r.active ? 'active' : ''}">${escapeHtmlInline(r.emoji)}${r.count ? ' <span class="reaction-count">' + escapeHtmlInline(r.count) + '</span>' : ''}</div>`
      ).join('') + '</div>';
    }

    const timeBlock = m.time ? `<div class="msg-time">${escapeHtmlInline(m.time)}</div>` : '';

    return `
      <div class="msg-row ${side} ${grouped ? 'grouped' : ''}">
        ${avatarHtml}
        <div class="msg-bubble">
          ${authorBlock}
          ${forwardBlock}
          ${mediaHtml}
          ${voiceHtml}
          ${textBlock}
          ${reactionsHtml}
          ${timeBlock}
        </div>
      </div>
    `;
  }).join('');
  list.scrollTop = list.scrollHeight;
  window.scrollTo(0, document.body.scrollHeight);
}

function toggleVoice(id, btn) {
  const audio = document.getElementById(id);
  if (!audio) return;
  // останавливаем все остальные
  document.querySelectorAll('.voice-msg audio').forEach(a => {
    if (a !== audio && !a.paused) {
      a.pause();
      const otherBtn = a.parentElement.querySelector('.voice-play');
      if (otherBtn) otherBtn.textContent = '▶';
    }
  });
  if (audio.paused) {
    audio.play().then(() => {
      btn.textContent = '⏸';
    }).catch(e => toast('Ошибка: ' + e.message));
    audio.onended = () => { btn.textContent = '▶'; };
  } else {
    audio.pause();
    btn.textContent = '▶';
  }
}

function openImage(src) {
  // Простой просмотр в новой вкладке (для Telegram WebApp может не сработать, но fallback есть)
  window.open(src, '_blank');
}

async function refreshChatMessages() {
  const list = document.getElementById('messages-list');
  list.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api(
      '/accounts/' + encodeURIComponent(currentChatAccount) +
      '/chats/' + encodeURIComponent(currentChatName) + '/messages'
    );
    renderMessages(data.items || data.messages || []);
  } catch (e) {
    list.innerHTML = `<div class="empty-state"><p>Ошибка: ${e.message}</p></div>`;
  }
}

async function sendMessage() {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text) return;
  if (!currentChatAccount || !currentChatName) return;

  hapticLight();
  input.value = '';
  input.disabled = true;

  try {
    await api(
      '/accounts/' + encodeURIComponent(currentChatAccount) +
      '/chats/' + encodeURIComponent(currentChatName) + '/send',
      { method: 'POST', body: { text } }
    );
    // обновляем переписку чтобы увидеть отправленное
    await refreshChatMessages();
  } catch (e) {
    toast('Не отправилось: ' + e.message);
    input.value = text; // вернём текст обратно
  } finally {
    input.disabled = false;
    input.focus();
  }
}

function backToChatList() {
  hapticLight();
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-chats').classList.add('active');
}

async function loadOlder() {
  hapticLight();
  const btn = document.getElementById('load-older-btn');
  const oldText = btn.innerHTML;
  btn.innerHTML = '⏳ Загружаю...';
  btn.disabled = true;
  try {
    const data = await api(
      '/accounts/' + encodeURIComponent(currentChatAccount) +
      '/chats/' + encodeURIComponent(currentChatName) + '/load_older',
      { method: 'POST' }
    );
    // используем те же сообщения, что вернулись (MAX подгрузил старые при скролле)
renderMessages(data.items || data.messages || []);
    toast(`Загружено ${(data.messages || []).length} сообщений`);
  } catch (e) {
    toast('Ошибка: ' + e.message);
  } finally {
    btn.innerHTML = oldText;
    btn.disabled = false;
  }
}

// ============ Старт ============
loadAccounts();
</script>
